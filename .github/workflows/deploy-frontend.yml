# =============================================================================
# GitHub Actions Workflow: Deploy Frontend to Azure Static Web Apps
# =============================================================================
# WHAT THIS DOES:
#   Automatically builds and deploys the React frontend to Azure Static Web Apps
#   whenever you push changes to the main branch.
#
# HOW TO SET THIS UP:
#   1. Create a GitHub repository for this project
#   2. Create an Azure Static Web App:
#      - Azure Portal → Search "Static Web Apps" → Create
#      - Subscription: your subscription
#      - Resource Group: llm-api-hub-rg
#      - Name: llm-api-hub-frontend
#      - Plan type: Free
#      - Region: East US 2
#      - Source: GitHub (it will connect to your GitHub account)
#      - Repository: select your repo
#      - Branch: main
#      - Build Presets: React
#      - App location: /frontend
#      - Output location: dist
#   3. Azure will automatically create this workflow file and add the secret.
#      If you set it up manually, add AZURE_STATIC_WEB_APPS_API_TOKEN to
#      GitHub → Settings → Secrets and variables → Actions
#
# 💰 COST: Azure Static Web Apps Free tier = $0/month (for dev/hobby projects)
#   Standard tier = ~$9/month (for custom domains, auth, staging environments)
# =============================================================================

name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'        # Only run when frontend files change
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_frontend:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend

    steps:
      # Step 1: Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # Step 2: Set up Node.js
      # Use Node 20 LTS — the same version you use locally
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      # Step 3: Install dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # Step 4: Build the React app
      # The VITE_ environment variables are injected at build time
      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APIM_GATEWAY_URL: ${{ secrets.VITE_APIM_GATEWAY_URL }}
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.VITE_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.VITE_AZURE_AD_TENANT_ID }}
          VITE_APP_NAME: "LLM API Hub"
        run: npm run build

      # Step 5: Deploy to Azure Static Web Apps
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"
          output_location: "dist"
          skip_app_build: true     # We built it in the previous step

  # Close pull request deployments when PR is merged/closed
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Preview

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
